name: Build BadApple

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Install libpng
        shell: pwsh
        run: |
          .\vcpkg\vcpkg install libpng:x64-windows

      - name: Build solution
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: |
          msbuild BadApple.sln /p:Configuration=Release /p:Platform=x64 /p:VcpkgEnabled=true /p:VcpkgTriplet=x64-windows /p:VcpkgRoot="$Env:VCPKG_ROOT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: badapple-exe
          path: BadApple/**/BadApple.exe
